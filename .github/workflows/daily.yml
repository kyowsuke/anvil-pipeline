name: Anvil Daily Update

on:
  schedule:
    # 毎日 UTC 18:00 (日本時間 翌3:00) に自動実行
    - cron: '0 18 * * *'
  workflow_dispatch:
    # 手動実行もできるようにする(GitHubの画面から「Run workflow」で即実行可能)

permissions:
  contents: write  # git push するために必要

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas requests pyarrow

      - name: Run daily fetch
        run: python fetch_daily.py

      - name: Commit and push new data
        run: |
          git config --global user.name "anvil-bot"
          git config --global user.email "actions@github.com"
          git add data/ state.json
          git diff --staged --quiet || git commit -m "Daily update: $(date -u +'%Y-%m-%d')"
          git push
